<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIVALCE — Dashboard P&L por Producto</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#0a0e1a;--s1:#111827;--s2:#1a2235;--bd:#2a3450;--tx:#e8ecf4;--t2:#8899b4;--ac:#4f8cff;--gn:#00d4aa;--rd:#ff4d6a;--or:#ffb84d;--pu:#a78bfa}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--tx)}
.header{background:linear-gradient(135deg,#0d1117,#1a2235);border-bottom:1px solid var(--bd);padding:16px 24px;display:flex;justify-content:space-between;align-items:center}
.header h1{font-size:20px;font-weight:700}.header h1 span{color:var(--ac)}
.header .sub{color:var(--t2);font-size:12px;margin-top:2px}
.tabs{display:flex;gap:0;background:var(--s1);border-bottom:1px solid var(--bd);padding:0 24px}
.tab{padding:12px 20px;font-size:13px;font-weight:500;color:var(--t2);cursor:pointer;border-bottom:2px solid transparent;transition:all .2s}
.tab:hover{color:var(--tx)}.tab.active{color:var(--ac);border-bottom-color:var(--ac)}
.content{padding:24px;max-width:1400px;margin:0 auto}
.kpis{display:grid;grid-template-columns:repeat(5,1fr);gap:12px;margin-bottom:24px}
.kpi{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px;text-align:center}
.kpi .lb{font-size:10px;color:var(--t2);text-transform:uppercase;letter-spacing:1px}
.kpi .vl{font-family:'JetBrains Mono';font-size:22px;font-weight:600;margin-top:6px}
.kpi .delta{font-size:11px;margin-top:4px}
.row{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
.card{background:var(--s2);border:1px solid var(--bd);border-radius:10px;padding:16px}
.card h3{font-size:13px;color:var(--or);margin-bottom:12px;text-transform:uppercase;letter-spacing:.5px}
.card.full{grid-column:1/-1}
table{width:100%;border-collapse:collapse;font-size:12px}
th{background:var(--s1);color:var(--t2);padding:8px;text-align:left;font-size:10px;text-transform:uppercase;letter-spacing:.5px;position:sticky;top:0;z-index:1}
td{padding:6px 8px;border-bottom:1px solid rgba(42,52,80,.4)}
tr:hover{background:rgba(79,140,255,.03)}
.mono{font-family:'JetBrains Mono';font-size:11px}
.neg{color:var(--rd)}.pos{color:var(--gn)}.warn{color:var(--or)}
.tag{display:inline-block;padding:2px 6px;border-radius:3px;font-size:9px;font-weight:600}
.tag-ok{background:rgba(0,212,170,.15);color:var(--gn)}
.tag-bad{background:rgba(255,77,106,.15);color:var(--rd)}
.tag-warn{background:rgba(255,184,77,.15);color:var(--or)}
.hidden{display:none}
.sr{display:flex;justify-content:space-between;padding:3px 0;font-size:12px}
.sr .lb{color:var(--t2)}.sr .vl{font-family:'JetBrains Mono';font-weight:600}
@media(max-width:900px){.kpis{grid-template-columns:repeat(2,1fr)}.row{grid-template-columns:1fr}}
</style>
</head>

function fmt(n){return Math.abs(n).toLocaleString("es-AR",{maximumFractionDigits:0})}
function fmtD(n){return n.toFixed(2)}
function pct(n){return (n*100).toFixed(1)+"%"}

var currentTab = "resumen";
var tabNames = [
  {id:"resumen",label:"Resumen Ejecutivo"},
  {id:"proveedores",label:"Por Proveedor"},
  {id:"productos",label:"Por Producto"},
  {id:"alertas",label:"Alertas"},
  {id:"simulador",label:"Simulador"},
  {id:"unitario",label:"Vista Unitaria"}
];

function renderTabs(){
  var h = "";
  for(var i=0;i<tabNames.length;i++){
    var t = tabNames[i];
    var ac = currentTab===t.id?" active":"";
    h += "<div class=\"tab"+ac+"\" data-tab=\""+t.id+"\">"+t.label+"</div>";
  }
  document.getElementById("tabs").innerHTML = h;
  var tabEls = document.getElementById("tabs").getElementsByClassName("tab");
  for(var j=0;j<tabEls.length;j++){
    tabEls[j].addEventListener("click", function(){switchTab(this.getAttribute("data-tab"))});
  }
}

function switchTab(id){
  currentTab = id;
  renderTabs();
  renderContent();
}

function renderContent(){
  if(currentTab==="resumen") renderResumen();
  else if(currentTab==="proveedores") renderProveedores();
  else if(currentTab==="productos") renderProductos();
  else if(currentTab==="alertas") renderAlertas();
  else if(currentTab==="simulador") renderSimulador();
  else if(currentTab==="unitario") renderUnitario();
}

function renderProductos(){
  var h = '<div class="card full"><h3>P&L Detallado por Producto</h3>';

  h += '<select id="filter-prov" onchange="doFilterProducts()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:6px;border-radius:6px;font-size:12px"><option value="ALL">Todos</option>';

  h += '</select>';
  h += '<input id="search-prod" placeholder="Buscar..." oninput="doFilterProducts()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:6px;border-radius:6px;font-size:12px;flex:1;min-width:120px">';

function doFilterProducts(){
  var prov = document.getElementById("filter-prov").value;
  var search = document.getElementById("search-prod").value.toLowerCase();
  var sort = document.getElementById("sort-prod").value;
  var items = [];
  for(var i=0;i<D.products.length;i++){
    var p = D.products[i];
    if(prov!=="ALL" && p.proveedor!==prov) continue;
    if(search && (p.producto+p.proveedor).toLowerCase().indexOf(search)<0) continue;
    items.push(p);
  }
  if(sort==="revenue") items.sort(function(a,b){return b.revenue-a.revenue});
  else if(sort==="ebitda") items.sort(function(a,b){return b.ebitda_abs-a.ebitda_abs});
  else if(sort==="margin") items.sort(function(a,b){return b.ebitda_pct-a.ebitda_pct});
  else if(sort==="vol") items.sort(function(a,b){return b.vol-a.vol});
  
  var h = '<table><thead><tr><th>Proveedor</th><th>Producto</th><th style="text-align:right">Precio</th><th style="text-align:right">Costo</th><th style="text-align:right">CMG</th><th>CMG%</th><th style="text-align:right">EBITDA</th><th>EBITDA%</th><th style="text-align:right">Revenue</th><th>Vol</th><th>Status</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){
    var p=items[i];
    var color = p.ebitda_pct>0.1?'var(--gn)':p.ebitda_pct>0?'var(--or)':'var(--rd)';
    var tag = p.ebitda>0?(p.ebitda_pct>0.1?'<span class="tag tag-ok">OK</span>':'<span class="tag tag-warn">!!</span>'):'<span class="tag tag-bad">X</span>';
    h += '<tr><td style="font-size:10px;color:var(--t2)">'+p.proveedor+'</td><td style="font-weight:500">'+p.producto+'</td><td class="mono" style="text-align:right">'+fmtD(p.precio)+'</td><td class="mono" style="text-align:right">'+fmtD(Math.abs(p.ddp))+'</td><td class="mono" style="text-align:right;color:'+color+'">'+fmtD(p.cmg)+'</td><td class="mono" style="color:'+color+'">'+pct(p.cmg_pct)+'</td><td class="mono" style="text-align:right;color:'+color+'">'+fmtD(p.ebitda)+'</td><td class="mono" style="color:'+color+'">'+pct(p.ebitda_pct)+'</td><td class="mono" style="text-align:right">'+fmt(p.revenue)+'</td><td class="mono">'+fmt(p.vol)+'</td><td>'+tag+'</td></tr>';
  }
  h += '</tbody></table>';
  document.getElementById("prod-table").innerHTML = h;
}

function renderAlertas(){
  var costGtPrice=[], negMargin=[], zeroVol=[];
  for(var i=0;i<D.products.length;i++){
    var p=D.products[i];
    if(Math.abs(p.ddp)>p.precio && p.vol>0) costGtPrice.push(p);
    if(p.ebitda<0 && p.vol>0) negMargin.push(p);
    if(p.vol===0) zeroVol.push(p);
  }
  negMargin.sort(function(a,b){return a.ebitda_abs-b.ebitda_abs});
  var totalLoss = 0;
  for(var i=0;i<negMargin.length;i++) totalLoss += negMargin[i].ebitda_abs;
  
  var h = '<div class="kpis" style="grid-template-columns:repeat(3,1fr)">';
  h += '<div class="kpi" style="border-color:var(--rd)"><div class="lb">Costo > Precio</div><div class="vl neg">'+costGtPrice.length+'</div></div>';
  h += '<div class="kpi" style="border-color:var(--or)"><div class="lb">EBITDA Negativo</div><div class="vl warn">'+negMargin.length+'</div></div>';
  h += '<div class="kpi"><div class="lb">Sin Volumen</div><div class="vl">'+zeroVol.length+'</div></div></div>';
  
  if(costGtPrice.length){
    h += '<div class="card full"><h3>COSTO DDP > PRECIO DE VENTA</h3><table><thead><tr><th>Producto</th><th>Proveedor</th><th style="text-align:right">Precio</th><th style="text-align:right">Costo</th><th style="text-align:right">Diferencia</th><th>Vol</th></tr></thead><tbody>';
    for(var i=0;i<costGtPrice.length;i++){
      var p=costGtPrice[i];
      h += '<tr><td style="font-weight:500">'+p.producto+'</td><td style="color:var(--t2)">'+p.proveedor+'</td><td class="mono" style="text-align:right">'+fmtD(p.precio)+'</td><td class="mono neg" style="text-align:right">'+fmtD(Math.abs(p.ddp))+'</td><td class="mono neg" style="text-align:right">('+fmtD(Math.abs(p.ddp)-p.precio)+')</td><td class="mono">'+fmt(p.vol)+'</td></tr>';
    }
    h += '</tbody></table></div>';
  }
  
  h += '<div class="card full"><h3>PRODUCTOS CON EBITDA NEGATIVO — Perdida: USD '+fmt(totalLoss)+'</h3><table><thead><tr><th>Producto</th><th>Proveedor</th><th style="text-align:right">Perdida/kg</th><th style="text-align:right">Perdida Total</th><th>Margen</th><th>Vol</th><th>Accion</th></tr></thead><tbody>';
  for(var i=0;i<negMargin.length;i++){
    var p=negMargin[i];
    var action = Math.abs(p.ddp)>p.precio?'Subir precio o discontinuar':p.ebitda_pct>-0.1?'Revisar pricing':'Evaluar discontinuacion';
    h += '<tr><td style="font-weight:500">'+p.producto+'</td><td style="color:var(--t2)">'+p.proveedor+'</td><td class="mono neg" style="text-align:right">'+fmtD(p.ebitda)+'</td><td class="mono neg" style="text-align:right">('+fmt(p.ebitda_abs)+')</td><td class="mono neg">'+pct(p.ebitda_pct)+'</td><td class="mono">'+fmt(p.vol)+'</td><td style="font-size:11px;color:var(--or)">'+action+'</td></tr>';
  }
  h += '</tbody></table></div>';
  document.getElementById("content").innerHTML = h;
}

function renderSimulador(){
  var top15=[];
  var sorted = D.products.slice().sort(function(a,b){return b.revenue-a.revenue});
  for(var i=0;i<sorted.length && top15.length<15;i++){
    if(sorted[i].vol>0) top15.push(sorted[i]);
  }
  window._simProds = top15;
  window._simPrices = [];
  for(var i=0;i<top15.length;i++) window._simPrices.push(top15[i].precio);
  
  var h = '<div class="card full"><h3>Simulador de Pricing — Top 15 productos</h3><p style="color:var(--t2);font-size:12px;margin-bottom:16px">Ajuste el precio y vea como cambia el EBITDA total</p>';
  h += '<div style="display:grid;grid-template-columns:180px 70px 1fr 70px 80px 70px;gap:6px;align-items:center;font-size:10px;color:var(--t2);padding-bottom:8px;border-bottom:1px solid var(--bd)"><div>Producto</div><div>Actual</div><div>Nuevo Precio</div><div>EBITDA/kg</div><div>EBITDA Total</div><div>Delta</div></div>';
  for(var i=0;i<top15.length;i++){
    var p=top15[i];
    var mn=Math.max(0,Math.round(p.precio*50));
    var mx=Math.round(p.precio*200);
    h += '<div style="display:grid;grid-template-columns:180px 70px 1fr 70px 80px 70px;gap:6px;align-items:center;padding:6px 0;border-bottom:1px solid var(--bd)">';
    h += '<div style="font-size:12px;font-weight:500;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">'+p.producto+'</div>';
    h += '<div class="mono">'+fmtD(p.precio)+'</div>';
    h += '<div style="display:flex;align-items:center;gap:6px"><input type="range" min="'+mn+'" max="'+mx+'" value="'+Math.round(p.precio*100)+'" oninput="simUpd('+i+',this.value)" style="flex:1;height:4px;-webkit-appearance:none;background:var(--bd);border-radius:2px;outline:none;cursor:pointer"><span class="mono" id="sp'+i+'" style="min-width:45px">'+fmtD(p.precio)+'</span></div>';
    h += '<div class="mono" id="se'+i+'">'+fmtD(p.ebitda)+'</div>';
    h += '<div class="mono" id="st'+i+'">'+fmt(p.ebitda_abs)+'</div>';
    h += '<div class="mono" id="sd'+i+'">0</div>';
    h += '</div>';
  }
  h += '<div style="margin-top:16px;padding:16px;background:var(--s1);border-radius:8px;display:flex;justify-content:space-between;align-items:center">';
  h += '<div><span style="color:var(--t2);font-size:12px">EBITDA Total Simulado:</span><span class="mono" style="font-size:18px;margin-left:12px" id="simTotalE">USD '+fmt(D.totals.ebitda)+'</span></div>';
  h += '<div><span style="color:var(--t2);font-size:12px">Delta vs Actual:</span><span class="mono" style="font-size:18px;margin-left:12px" id="simTotalD">USD 0</span></div>';
  h += '</div></div>';
  document.getElementById("content").innerHTML = h;
}

function simUpd(i,val){
  var p=window._simProds[i];
  var np=val/100;
  window._simPrices[i]=np;
  document.getElementById("sp"+i).textContent=fmtD(np);
  var ne=p.ebitda+(np-p.precio)*0.953;
  var nt=ne*p.vol;
  var delta=nt-p.ebitda_abs;
  var el=document.getElementById("se"+i);el.textContent=fmtD(ne);el.style.color=ne>=0?"var(--gn)":"var(--rd)";
  var tl=document.getElementById("st"+i);tl.textContent=fmt(nt);tl.style.color=nt>=0?"var(--gn)":"var(--rd)";
  var dl=document.getElementById("sd"+i);dl.textContent=(delta>=0?"+":"")+fmt(delta);dl.style.color=delta>=0?"var(--gn)":"var(--rd)";
  var totalDelta=0;
  for(var j=0;j<window._simProds.length;j++){
    var sp=window._simProds[j];
    var snp=window._simPrices[j];
    var sne=sp.ebitda+(snp-sp.precio)*0.953;
    totalDelta+=(sne*sp.vol)-sp.ebitda_abs;
  }
  var newTotal=D.totals.ebitda+totalDelta;
  var te=document.getElementById("simTotalE");te.textContent="USD "+(newTotal>=0?"":"-")+fmt(newTotal);te.style.color=newTotal>=0?"var(--gn)":"var(--rd)";
  var td=document.getElementById("simTotalD");td.textContent="USD "+(totalDelta>=0?"+":"")+fmt(totalDelta);td.style.color=totalDelta>=0?"var(--gn)":"var(--rd)";
}

function renderUnitario(){
  var h = '<div class="row"><div class="card" style="grid-column:1/-1"><h3>P&L Unitario — Waterfall USD/kg</h3>';
  h += '<div style="margin-bottom:12px;display:flex;gap:8px;flex-wrap:wrap">';
  h += '<select id="u-prov" onchange="doFilterUnit()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:6px;border-radius:6px;font-size:12px"><option value="ALL">Todos</option>';
  for(var i=0;i<D.proveedores.length;i++) h += '<option value="'+D.proveedores[i].nombre+'">'+D.proveedores[i].nombre+'</option>';
  h += '</select>';
  h += '<select id="u-status" onchange="doFilterUnit()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:6px;border-radius:6px;font-size:12px"><option value="ALL">Todos</option><option value="POS">Rentables</option><option value="NEG">Con perdida</option></select>';
  h += '<input id="u-search" placeholder="Buscar..." oninput="doFilterUnit()" style="background:var(--s1);border:1px solid var(--bd);color:var(--tx);padding:6px;border-radius:6px;font-size:12px;flex:1">';
  h += '</div><div id="u-table" style="max-height:calc(100vh - 360px);overflow-y:auto"></div></div></div>';
  h += '<div class="row"><div class="card" id="u-detail"><h3>Detalle Unitario</h3><p style="color:var(--t2);font-size:12px">Click en un producto para ver el waterfall</p></div>';
  
  // Average cost distribution
  var items = D.products.filter(function(p){return p.vol>0});
  var avgP=0,avgM=0,tVol=0;
  for(var i=0;i<items.length;i++){avgP+=items[i].precio*items[i].vol;avgM+=Math.abs(items[i].ddp)*items[i].vol;tVol+=items[i].vol}
  avgP/=tVol;avgM/=tVol;
  var avgCMG=avgP-avgM-0.2879-0.047-0.2;
  var avgE=avgCMG-D.totals.gastos_fijos_kg;
  
  h += '<div class="card"><h3>Costos Promedio Ponderado</h3><div style="margin-top:8px">';
  h += '<div class="sr"><span class="lb">Precio Venta</span><span class="vl">USD '+avgP.toFixed(2)+'</span></div>';
  h += '<div class="sr"><span class="lb">(-) Costo MP</span><span class="vl neg">USD '+avgM.toFixed(2)+'</span></div>';
  h += '<div class="sr"><span class="lb">(-) MOD+E+L</span><span class="vl" style="color:var(--t2)">USD 0.29</span></div>';
  h += '<div class="sr"><span class="lb">(-) Imp+Flete</span><span class="vl" style="color:var(--t2)">USD 0.25</span></div>';
  h += '<div style="border-top:1px solid var(--bd);margin:4px 0"></div>';
  h += '<div class="sr"><span class="lb" style="font-weight:600">= CMG</span><span class="vl" style="color:'+(avgCMG>=0?'var(--gn)':'var(--rd)')+'">USD '+avgCMG.toFixed(2)+'</span></div>';
  h += '<div class="sr"><span class="lb">(-) Gastos Fijos</span><span class="vl warn">USD '+D.totals.gastos_fijos_kg.toFixed(2)+'</span></div>';
  h += '<div style="border-top:2px solid var(--bd);margin:4px 0"></div>';
  h += '<div class="sr"><span class="lb" style="font-weight:700">= EBITDA</span><span class="vl" style="color:'+(avgE>=0?'var(--gn)':'var(--rd)')+';font-size:16px">USD '+avgE.toFixed(2)+'</span></div>';
  h += '<div style="border-top:1px solid var(--bd);margin:4px 0"></div>';
  var avgGF = Math.abs(D.totals.gastos_fin) / D.totals.vol;
  var avgCF = Math.abs(D.totals.cf_inventario) / D.totals.vol;
  h += '<div class="sr"><span class="lb">(-) Gastos Financieros</span><span class="vl neg">USD '+avgGF.toFixed(4)+'</span></div>';
  h += '<div class="sr"><span class="lb">(-) CF Inventario</span><span class="vl neg">USD '+avgCF.toFixed(4)+'</span></div>';
  h += '<div style="border-top:2px solid var(--pu);margin:4px 0"></div>';
  var avgRN = D.totals.result_neto / D.totals.vol;
  h += '<div class="sr"><span class="lb" style="font-weight:700">= Result. Neto</span><span class="vl" style="color:'+(avgRN>=0?'var(--gn)':'var(--rd)')+'">USD '+avgRN.toFixed(2)+'</span></div>';
  h += '</div></div></div>';
  document.getElementById("content").innerHTML = h;
  doFilterUnit();
}

function doFilterUnit(){
  var prov=document.getElementById("u-prov").value;
  var status=document.getElementById("u-status").value;
  var search=document.getElementById("u-search").value.toLowerCase();
  var items=[];
  for(var i=0;i<D.products.length;i++){
    var p=D.products[i];
    if(p.vol<=0)continue;
    if(prov!=="ALL"&&p.proveedor!==prov)continue;
    if(status==="POS"&&p.ebitda<=0)continue;
    if(status==="NEG"&&p.ebitda>0)continue;
    if(search&&(p.producto+p.proveedor).toLowerCase().indexOf(search)<0)continue;
    items.push(p);
  }
  items.sort(function(a,b){return b.revenue-a.revenue});
  var maxP=0;for(var i=0;i<items.length;i++)if(items[i].precio>maxP)maxP=items[i].precio;
  
  var h='<table><thead><tr><th>Proveedor</th><th>Producto</th><th style="text-align:right">Precio</th><th style="text-align:right">MP</th><th style="text-align:right">MOD</th><th style="text-align:right">Imp+Fl</th><th style="text-align:right">CMG</th><th>CMG%</th><th style="text-align:right">GF</th><th style="text-align:right">EBITDA</th><th>%</th><th>Waterfall</th></tr></thead><tbody>';
  for(var i=0;i<items.length;i++){
    var p=items[i];
    var mp=Math.abs(p.ddp);
    var gf=D.totals.gastos_fijos_kg;
    var bw=maxP>0?100:0;
    var mpW=mp/maxP*bw;var modW=0.2879/maxP*bw;var impW=0.247/maxP*bw;var gfW=gf/maxP*bw;
    var eW=p.ebitda>0?p.ebitda/maxP*bw:0;
    var lW=p.ebitda<0?Math.min(Math.abs(p.ebitda)/maxP*bw,15):0;
    var ec=p.ebitda_pct>0.1?'var(--gn)':p.ebitda_pct>0?'var(--or)':'var(--rd)';
    h+='<tr style="cursor:pointer" onclick="showUnitDetail('+i+')">';
    h+='<td style="font-size:10px;color:var(--t2)">'+p.proveedor+'</td>';
    h+='<td style="font-weight:500">'+p.producto+'</td>';
    h+='<td class="mono" style="text-align:right">'+fmtD(p.precio)+'</td>';
    h+='<td class="mono neg" style="text-align:right">'+fmtD(mp)+'</td>';
    h+='<td class="mono" style="text-align:right;color:var(--t2)">0.29</td>';
    h+='<td class="mono" style="text-align:right;color:var(--t2)">0.25</td>';
    h+='<td class="mono" style="text-align:right;color:'+ec+'">'+fmtD(p.cmg)+'</td>';
    h+='<td class="mono" style="color:'+ec+'">'+(p.cmg_pct*100).toFixed(1)+'%</td>';
    h+='<td class="mono" style="text-align:right;color:var(--or)">'+fmtD(gf)+'</td>';
    h+='<td class="mono" style="text-align:right;color:'+ec+'">'+fmtD(p.ebitda)+'</td>';
    h+='<td class="mono" style="color:'+ec+'">'+(p.ebitda_pct*100).toFixed(1)+'%</td>';
    h+='<td><div style="display:flex;height:10px;border-radius:2px;overflow:hidden;width:'+bw+'px;background:var(--bd)">';
    h+='<div style="width:'+mpW+'px;background:var(--rd);opacity:.7"></div>';
    h+='<div style="width:'+modW+'px;background:var(--or);opacity:.7"></div>';
    h+='<div style="width:'+impW+'px;background:var(--pu);opacity:.5"></div>';
    h+='<div style="width:'+gfW+'px;background:var(--t2);opacity:.5"></div>';
    if(p.ebitda>0)h+='<div style="width:'+eW+'px;background:var(--gn)"></div>';
    else h+='<div style="width:'+lW+'px;background:var(--rd);opacity:.3"></div>';
    h+='</div></td></tr>';
  }
  h+='</tbody></table>';
  document.getElementById("u-table").innerHTML=h;
  window._unitItems=items;
}

function showUnitDetail(idx){
  var p=window._unitItems[idx];
  var mp=Math.abs(p.ddp);
  var gf=D.totals.gastos_fijos_kg;
  var h='<h3>'+p.producto+'</h3><div style="margin-top:10px">';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-size:13px">Precio de Venta</span><span class="vl" style="font-size:15px">USD '+fmtD(p.precio)+' /kg</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Materia Prima DDP</span><span class="vl neg">USD '+fmtD(mp)+'</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) MOD + Energia</span><span class="vl" style="color:var(--t2)">USD 0.29</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Impuestos</span><span class="vl" style="color:var(--t2)">USD 0.047</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Flete</span><span class="vl" style="color:var(--t2)">USD 0.20</span></div>';
  h+='<div style="border-top:2px solid var(--bd);margin:6px 0"></div>';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-weight:700">= CMG</span><span class="vl" style="color:'+(p.cmg>=0?'var(--gn)':'var(--rd)')+';font-size:15px">USD '+fmtD(p.cmg)+' /kg</span></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Gastos Fijos</span><span class="vl warn">USD '+fmtD(gf)+'</span></div>';
  h+='<div style="border-top:3px solid var(--ac);margin:6px 0"></div>';
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-weight:700;font-size:14px">= EBITDA</span><span class="vl" style="color:'+(p.ebitda>=0?'var(--gn)':'var(--rd)')+';font-size:18px">USD '+fmtD(p.ebitda)+' /kg</span></div>';
  h+='<div style="border-top:1px solid var(--bd);margin:6px 0"></div>';
  h+='<div class="sr"><span class="lb">Volumen anual</span><span class="vl">'+fmt(p.vol)+' kg</span></div>';
  h+='<div class="sr"><span class="lb">EBITDA anual</span><span class="vl" style="color:'+(p.ebitda_abs>=0?'var(--gn)':'var(--rd)')+'">USD '+fmt(p.ebitda_abs)+'</span></div>';
  h+='<div style="border-top:1px solid var(--bd);margin:6px 0"></div>';
  h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) Gastos Financieros</span><span class="vl" style="color:var(--rd)">USD '+fmtD(Math.abs(p.gastos_fin))+'</span></div>';
  if(p.cf_inventario!=0){
    h+='<div class="sr" style="padding:3px 0;padding-left:12px"><span class="lb">(-) CF Inventario</span><span class="vl" style="color:var(--rd)">USD '+fmtD(Math.abs(p.cf_inventario))+'</span></div>';
  }
  h+='<div style="border-top:2px solid var(--pu);margin:6px 0"></div>';
  var rn = p.result_neto || (p.ebitda + p.gastos_fin + p.cf_inventario);
  h+='<div class="sr" style="padding:6px 0"><span class="lb" style="font-weight:700;font-size:13px">= Resultado Neto</span><span class="vl" style="color:'+(rn>=0?'var(--gn)':'var(--rd)')+';font-size:16px">USD '+fmtD(rn)+' /kg</span></div>';
  if(p.ebitda<0){
    h+='<div style="margin-top:8px;padding:8px;background:rgba(255,77,106,.1);border-radius:6px;font-size:11px;color:var(--rd)">Para breakeven: USD '+fmtD(p.precio-p.ebitda)+'/kg (+'+fmtD(Math.abs(p.ebitda))+')</div>';
  }
  h+='</div>';
  document.getElementById("u-detail").innerHTML=h;
}

renderTabs();
renderContent();
</script>
